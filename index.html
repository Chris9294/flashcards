<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Flashcards</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Flashcards Langues</h1>

<!-- Miniatures -->
<div id="thumbnails"></div>

<!-- Grand écran flashcard -->
<div id="flashcard">
  <div id="cardContent">
    <img src="" class="big-image" id="mainImage">
    <div id="leftArrow">&#8592;</div>
    <div id="rightArrow">&#8594;</div>
  </div>

  <!-- Boutons à droite -->
  <div id="cardButtons">
    <button id="flipButton">&#x21bb;</button>
    <button id="audioButton">&#128266;</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
