<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Flashcards Visuel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>FlAshcArDs!</h1>

  <label for="themeSelect">Choisir la série :</label>
  <select id="themeSelect"></select>

  <!-- Flashcard plein écran -->
  <div id="flashcard">
    <div id="overlay"></div>
    <div id="cardContent"></div>

    <!-- Boutons à droite -->
    <div id="cardButtons">
      <button id="flipBtn">🔄</button>
      <button id="speakBtn">🔊</button>
    </div>

    <!-- Flèches navigation (dans le flashcard, superposées à l'image) -->
    <div id="leftArrow" class="navArrow" style="display:none;">&#8592;</div>
    <div id="rightArrow" class="navArrow" style="display:none;">&#8594;</div>
  </div>

  <!-- Miniatures en bas -->
  <div id="thumbnails"></div>

  <script src="script.js"></script>
</body>
</html>
