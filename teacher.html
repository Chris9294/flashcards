<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Interface enseignant</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, button { margin: 5px 0; }
    img { height: 60px; display: block; margin-top: 5px; }
    .card { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
  </style>
</head>
<body>

<h1>Interface enseignant</h1>

<h2>Créer une série</h2>
<input id="themeName" placeholder="Nom de la série">
<button onclick="addTheme()">Ajouter la série</button>

<h2>Ajouter une carte</h2>

<select id="themeSelect"></select><br><br>

<label>
  Mot en anglais :
  <input id="wordInput">
</label><br><br>

<label>
  Image (obligatoire) :
  <input type="file" id="imageInput" accept="image/*">
</label><br><br>

<label>
  Audio (optionnel – prononciation) :
  <input type="file" id="audioInput" accept="audio/*">
</label><br><br>

<button onclick="addCard()">Ajouter la carte</button>

<h2>Cartes existantes</h2>
<div id="cardsList"></div>

<script src="teacher.js"></script>
</body>
</html>
