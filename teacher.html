<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Interface enseignant</title>
 <link rel="stylesheet" href="teacher.css">
</head>
<body>

<h1>Interface enseignant</h1>

<h2>Créer une série</h2>
<input id="themeName" placeholder="Nom de la série">
<button onclick="addTheme()">Ajouter la série</button>

<h2>Ajouter une carte</h2>

<div class="theme-row">
  <select id="themeSelect"></select>
  <button id="deleteThemeBtn" class="danger-btn">Supprimer la série</button>
</div>

<div class="add-card-row">
  <div>
    <label>Texte</label><br>
    <input id="wordInput">
  </div>

  <div>
    <label>Image</label><br>
    <input type="file" id="imageInput" accept="image/*">
  </div>

  <div>
    <label>Audio</label><br>
    <input type="file" id="audioInput" accept="audio/*">
  </div>
</div>

<button onclick="addCard()" class="primary-btn">➕ Ajouter la carte</button>

<h2 id="cardsTitle">Cartes existantes</h2>
<p id="cardsCount"></p>
<div id="cardsList"></div>

<script src="teacher.js"></script>
</body>
</html>
