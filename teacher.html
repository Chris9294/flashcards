<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Interface enseignant</title>
  <link rel="stylesheet" href="teacher.css">
</head>
<body>

<h1>FlashCards! - Interface enseignant</h1>
<button id="backToFlashcardsBtn">
  ⬅️ Retour aux flashcards
</button>

<!-- ==========================
     CRÉATION DE SÉRIE
     ========================== -->
<h2>Ajouter une série</h2>
<input id="themeName" type="text" placeholder="Nom de la série">
<button onclick="addTheme()">Ajouter la série</button>

<!-- ==========================
     SÉLECTION DE SÉRIE
     ========================== -->
<h2>Choix de la série</h2>
<div class="theme-row">
  <select id="themeSelect"></select>
  <button id="deleteThemeBtn" class="danger-btn">🗑️ Supprimer la série</button>
</div>

<!-- ==========================
     AJOUT DE CARTE
     ========================== -->
<h2>Créer une carte</h2>

<div class="add-card-row">
  <label class="add-card-field">
    Texte de la carte
    <input id="wordInput" type="text">
  </label>

  <label class="add-card-field">
    Image (obligatoire)
    <span class="file-wrapper">
      <input type="file" id="imageInput" accept="image/*">
      <span class="file-label">Parcourir…</span>
    </span>
  </label>

  <label class="add-card-field">
    Audio (optionnel)
    <span class="file-wrapper">
      <input type="file" id="audioInput" accept="audio/*">
      <span class="file-label">Parcourir…</span>
    </span>
  </label>
</div>

<button class="primary-btn" onclick="addCard()">Ajouter la carte</button>

<!-- ==========================
     CARTES EXISTANTES
     ========================== -->
<h2 id="cardsTitle">cartes existantes</h2>
<div id="cardsList"></div>

<script src="teacher.js"></script>
<script>
  // ==========================
  // Gestion des fichiers personnalisés
  // ==========================
  function setupFileInput(wrapperSelector, inputId) {
    const wrapper = document.querySelector(wrapperSelector);
    const input = wrapper.querySelector(`#${inputId}`);
    const btn = wrapper.querySelector('.file-btn');
    const nameSpan = wrapper.querySelector('.file-name');

    btn.addEventListener('click', () => input.click());
    input.addEventListener('change', () => {
      nameSpan.textContent = input.files[0]?.name || "Aucun fichier sélectionné";
    });
  }

  setupFileInput('.add-card-row .add-card-field:nth-child(2) .file-wrapper', 'imageInput');
  setupFileInput('.add-card-row .add-card-field:nth-child(3) .file-wrapper', 'audioInput');

  // Placeholder gris pour le select
  const themeSelect = document.getElementById('themeSelect');
  function updateSelectColor() {
    themeSelect.style.color = themeSelect.value === "" ? "gray" : "black";
  }
  themeSelect.addEventListener("change", updateSelectColor);
  updateSelectColor();
</script>
</body>
</html>
