<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Interface enseignant</title>
  <link rel="stylesheet" href="teacher.css">
</head>
<body>

<h1>Interface enseignant</h1>

<!-- ==========================
     CRÉATION DE SÉRIE
     ========================== -->
<h2>Ajouter une série</h2>

<input id="themeName" type="text" placeholder="Nom de la série">
<button onclick="addTheme()">Ajouter la série</button>

<!-- ==========================
     SÉLECTION DE SÉRIE
     ========================== -->
<h2>Choix de la série</h2>

<div class="theme-row">
  <select id="themeSelect"></select>
  <button id="deleteThemeBtn" class="danger-btn">
    🗑️ Supprimer la série
  </button>
</div>

<!-- ==========================
     AJOUT DE CARTE
     ========================== -->
<h2>Créer une carte</h2>

<div class="add-card-row">
  <label>
    Texte
    <input id="wordInput" type="text">
  </label>

  <label>
    Image
    <input type="file" id="imageInput" accept="image/*">
  </label>

  <label>
    Audio
    <input type="file" id="audioInput" accept="audio/*">
  </label>
</div>

<button class="primary-btn" onclick="addCard()">Ajouter la carte</button>

<!-- ==========================
     CARTES EXISTANTES
     ========================== -->
<h2 id="cardsTitle">Cartes existantes</h2>
<div id="cardsList"></div>

<script src="teacher.js"></script>
</body>
</html>
